TOPICS.forEach(t=>{const b=document.createElement('button');b.className='topic';const n=ALL.filter(x=>x.topic===t).length;b.textContent=`${t} (${n})`;b.onclick=()=>startTopic(t);topics.appendChild(b)});
function sh(a){return [...a].sort(()=>Math.random()-.5)}
function startTopic(t){last={type:'topic',t};current=sh(ALL.filter(x=>x.topic===t));begin()}
function startFinal(){last={type:'final'};current=sh(ALL).slice(0,50);begin()}
function startAll(){last={type:'all'};current=sh(ALL);begin()}
function startMistakes(){const ids=JSON.parse(localStorage.getItem('bio229mistakes')||'[]');const arr=ALL.filter((_,x)=>ids.includes(x));if(!arr.length){alert('ما في غلطات محفوظة لسا 🌟');return}last={type:'mistakes'};current=sh(arr);begin()}
function begin(){i=0;score=0;document.getElementById('home').style.display='none';document.getElementById('result').style.display='none';document.getElementById('quiz').style.display='block';render()}
function render(){answered=false;const x=current[i];document.getElementById('meta').textContent=`${x.topic} · שאלה ${i+1} מתוך ${current.length}`;document.getElementById('progress').style.width=`${i/current.length*100}%`;document.getElementById('q').textContent=x.q;const o=document.getElementById('opts');o.innerHTML='';x.options.forEach((v,j)=>{const b=document.createElement('button');b.className='option';b.textContent=`${String.fromCharCode(1488+j)}. ${v}`;b.onclick=()=>choose(j,b);o.appendChild(b)});document.getElementById('feedback').style.display='none';document.getElementById('next').style.display='none'}
function choose(j,b){if(answered)return;answered=true;const x=current[i];const bs=[...document.querySelectorAll('.option')];bs.forEach((z,k)=>{z.disabled=true;if(k===x.answer)z.classList.add('correct')});const f=document.getElementById('feedback');f.style.display='block';const gi=ALL.findIndex(y=>y.q===x.q);let m=JSON.parse(localStorage.getItem('bio229mistakes')||'[]');if(j===x.answer){score++;f.innerHTML=`<b style="color:#22c55e">✅ נכון!</b><br>${x.explain}`;m=m.filter(n=>n!==gi)}else{b.classList.add('wrong');f.innerHTML=`<b style="color:#ef4444">❌ לא נכון</b><br><b>התשובה:</b> ${x.explain}`;if(!m.includes(gi))m.push(gi)}localStorage.setItem('bio229mistakes',JSON.stringify(m));document.getElementById('next').style.display='inline-block';document.getElementById('progress').style.width=`${(i+1)/current.length*100}%`}
function nextQ(){if(i<current.length-1){i++;render()}else finish()}
function finish(){document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='block';const p=Math.round(score/current.length*100);document.getElementById('score').textContent=`${score} / ${current.length}`;document.getElementById('msg').textContent=p>=90?'ناررر 🔥':p>=75?'ممتازة 💚':p>=60?'منيح، راجعي الغلطات 🌱':'بدها جولة ثانية وبتتزبط 🧠'}
function home(){document.getElementById('quiz').style.display='none';document.getElementById('result').style.display='none';document.getElementById('home').style.display='block'}
function repeat(){if(last.type==='topic')startTopic(last.t);else if(last.type==='all')startAll();else if(last.type==='mistakes')startMistakes();else startFinal()}
</script></body></html>
